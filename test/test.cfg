! --- Configurazione Base ---
hostname ROUTER-EDGE-01
service password-encryption
enable secret 0 PasswordSicura123!
!
interface GigabitEthernet0/0
 description LINK-VERSO-LAN
 ip address 192.168.10.1 255.255.255.0
 duplex auto
 speed auto
 service-policy output QOS-OUT-LAN
!
interface GigabitEthernet0/1
 description LINK-VERSO-ISP
 ip address 203.0.113.2 255.255.255.252
!

! --- Configurazione QoS (MQC) ---
ip access-list extended ACL-VOIP
 permit udp any any range 16384 32767
!
class-map match-all CLASS-VOIP
 match access-group name ACL-VOIP
!
policy-map QOS-OUT-LAN
 class CLASS-VOIP
  priority percent 20
 class class-default
  fair-queue
!

! --- Configurazione BGP ---
router bgp 65001
 router-id 1.1.1.1
 neighbor 203.0.113.1 remote-as 65500
 neighbor 203.0.113.1 description PEER-ISP-PRIMARIO
 !
 address-family ipv4
  network 192.168.10.0 mask 255.255.255.0
  neighbor 203.0.113.1 activate
  neighbor 203.0.113.1 soft-reconfiguration inbound
 exit-address-family
!
! --- Gestione VLAN ---
vlan 10
 name AMMINISTRAZIONE
vlan 20
 name PRODUZIONE
!

! --- Gateway (SVI) ---
interface Vlan10
 ip address 10.0.10.1 255.255.255.0
!
interface Vlan20
 ip address 10.0.20.1 255.255.255.0
!

! --- Configurazione Porte Accesso e Trunk ---
interface GigabitEthernet1/0/1
 description PC-UTENTE-ADMIN
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
!
interface GigabitEthernet1/0/48
 description TRUNK-VERSO-ALTRO-SWITCH
 switchport mode trunk
 switchport trunk allowed vlan 10,20
!

! --- Accesso Remoto Sicuro (SSH) ---
ip domain-name la-mia-rete.local
crypto key generate rsa general-keys modulus 2048
!
line vty 0 4
 transport input ssh
 login local
!
username admin privilege 15 secret PasswordAdmin!